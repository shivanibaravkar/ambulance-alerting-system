<html>
<head>
    <title>MapmyIndia Plugin - Nearby Plugin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MapmyIndia Nearby Plugin">
    <script src="https://apis.mapmyindia.com/advancedmaps/v1/cda4cc16488645f1d41babcc561ed29a/map_load?v=1.5"></script>
    <script src="https://apis.mapmyindia.com/advancedmaps/api/cda4cc16488645f1d41babcc561ed29a/map_sdk_plugins"></script>
    <style>
        body {
            margin: 0;
        }
        #map {
            width: 99%;
            height: 300px;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="nearby_search" style="margin: 5px; width: 99%; height: 250px; overflow-y: auto; border-radius: 10px;"></div>
    <div id="map"></div>
    <script>
        window.onload = function() {
            /* Map Initialization */
            var map = new MapmyIndia.Map('map', { center: [28.09, 78.3], zoom: 5, search: false });

            /* Nearby plugin initialization */
            var options = {
                divId: 'nearby_search',
                map: map,
                keywords: 'Hospital',
                refLocation: [28.632735, 77.219696], // Your reference location
                fitbounds: true,
                click_callback: function(d) {
                    // Display more specific information
                    alert("You clicked on: " + d.name + " at " + d.latitude + ", " + d.longitude);
                }
            };

            var nr = MapmyIndia.nearby(options);
        };
    </script>
</body>
</html>
